# dev/patches/frontend-dev-watch.yaml
#
# Strategic-merge patch applied by 'make -f dev/Makefile dev-watch'.
# Swaps the nginx frontend container in the Helm-managed
# nebari-landing-frontend Deployment for a Vite HMR dev server that
# reads source files from a minikube-mount hostPath volume.
#
# Applied with:
#   kubectl patch deployment nebari-landing-frontend -n nebari-system \
#     --type=strategic --patch-file dev/patches/frontend-dev-watch.yaml
#
# Reverted by 'make -f dev/Makefile stop-dev-watch', which runs
#   helm upgrade ... --values dev/chart-values.yaml
# to restore the Deployment to its Helm-rendered state.
#
# DESIGN NOTES
# ─────────────
# 1. node_modules isolation
#    The macOS host's node_modules (darwin binaries) is exposed inside the
#    minikube VM via the 9p/virtfs mount. npm skips reinstall and Vite fails
#    trying to load darwin binaries on Linux.
#    Fix: an emptyDir is mounted at /app/node_modules, shadowing the host
#    node_modules. npm install then fetches Linux binaries into the emptyDir.
#
# 2. Polling watcher
#    9p (minikube mount) does not emit inotify events, so chokidar must poll.
#    VITE_USE_POLLING=true is forwarded to vite.config.ts which enables
#    server.watch.usePolling when that variable is set.
#
# 3. oauth2-proxy upstream port
#    The upstream arg passed to oauth2-proxy in the chart is
#    http://127.0.0.1:<frontend.port>. frontend.port is set to 8080 (non-root
#    nginx cannot bind privileged ports). Vite is started with --port 8080 to
#    match, and containerPort/probe ports are set to 8080 accordingly.

spec:
  template:
    spec:
      # node:22-alpine defaults to root — relax the pod-level restriction.
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        fsGroup: 0

      initContainers:
        # Strategic merge adds this alongside the waitForKeycloak container
        # already rendered by the chart; ordering is preserved.
        - name: wait-for-mount
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              echo "Waiting for minikube mount — /app/package.json must exist …"
              until [ -f /app/package.json ]; do sleep 1; done
              echo "Mount ready."
          volumeMounts:
            - name: frontend-src
              mountPath: /app
            - name: node-modules
              mountPath: /app/node_modules

      containers:
        # Strategic merge matches by name — merges into the nginx container.
        # The nginx volumeMounts are explicitly deleted by mountPath (the
        # strategic merge key for volumeMounts) before the volumes themselves
        # are removed below; without this the merged container still references
        # volumes that no longer exist and the API server rejects the patch.
        - name: frontend
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "npm install && exec npm run dev -- --host 0.0.0.0 --port 8080 --force"
          workingDir: /app
          env:
            - name: VITE_USE_POLLING
              value: "true"
            # Webapi ClusterIP — Vite proxies /api/ to this URL so the browser's
            # relative API calls are forwarded server-side with the Authorization
            # header that oauth2-proxy injects (mirrors what nginx does in prod).
            - name: WEBAPI_URL
              value: "http://nebari-landing-webapi.nebari-system.svc.cluster.local:8080"
            # oauth2-proxy injects large auth/cookie headers that exceed Node's
            # default 8 KB HTTP header buffer, causing Vite to respond 431.
            # Raise the limit to 64 KB.
            - name: NODE_OPTIONS
              value: "--max-http-header-size=65536"
            # Keycloak config is read at runtime from /config.json (Vite serves
            # frontend/public/config.json in dev mode — no VITE_* vars needed).
          ports:
            - name: http
              containerPort: 8080
          # Generous probes — npm install + Vite startup takes ~2-3 min.
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: []
          volumeMounts:
            # Delete the nginx scratch mounts (mountPath is the merge key).
            - mountPath: /tmp
              $patch: delete
            - mountPath: /var/cache/nginx
              $patch: delete
            - mountPath: /var/run
              $patch: delete
            # Add the Vite source and node_modules mounts.
            - name: frontend-src
              mountPath: /app
            - name: node-modules
              mountPath: /app/node_modules

      volumes:
        # Remove the nginx scratch volumes (they are unused by Vite).
        - name: nginx-tmp
          $patch: delete
        - name: nginx-cache
          $patch: delete
        - name: nginx-run
          $patch: delete
        # Host directory populated by 'minikube mount frontend/:/mnt/nebari-frontend'.
        - name: frontend-src
          hostPath:
            path: /mnt/nebari-frontend
            type: DirectoryOrCreate
        # emptyDir shadows macOS node_modules so Linux binaries are installed here.
        - name: node-modules
          emptyDir: {}
