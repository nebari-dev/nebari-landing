# dev/chart-values.yaml — Helm values overrides for local minikube dev
#
# Usage:
#   helm upgrade --install nebari-landing charts/nebari-landing \
#     --namespace nebari-system \
#     --values dev/chart-values.yaml
#
# The Makefile 'install' target uses this file automatically.
#
# Pre-requisites (already created by other make targets):
#   Secret nebari-landing-oauth2-proxy  (make frontend-client)
#     keys: client-secret, cookie-secret
#   Secret nebari-realm-admin-credentials  (make postgresql-secrets)
#     keys: username, password

# ---------------------------------------------------------------------------
# Webapi
# ---------------------------------------------------------------------------
webapi:
  image:
    # Image loaded into minikube by 'make image-build'
    repository: nebari-landing/webapi
    tag: dev
    # Never pull — image only exists inside minikube
    pullPolicy: Never

  keycloak:
    # Cluster-internal URL for back-channel calls (JWKS fetch, admin API)
    url: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local/auth"
    # Issuer URL that Keycloak stamps in JWTs — overridden by 'make install'
    # via --set with the live nip.io hostname (KC_HOSTNAME_URL in Keycloak values).
    # Placeholder only; 'make install' sets this to http://keycloak.<ip>.nip.io/auth
    issuerUrl: "http://keycloak.local/auth"
    realm: "nebari"
    enableAuth: true
    adminGroup: "admin"
    adminSecretName: "nebari-realm-admin-credentials"
    adminSecretNamespace: "keycloak"

  # Traffic enters via Envoy Gateway (HTTPRoute); ClusterIP is sufficient.
  # If Envoy Gateway is not installed, 'make install' falls back to
  # httpRoute.enabled=false and you can use kubectl port-forward instead.
  service:
    type: ClusterIP

# ---------------------------------------------------------------------------
# NebariApp CRs — operator creates the HTTPRoutes from these
# ---------------------------------------------------------------------------
# With nebariApp.enabled=true the chart emits NebariApp CRs for frontend
# and webapi. The nebari-operator reconciles them into Gateway API HTTPRoutes
# attached to the Envoy Gateway. The chart's own httproute.yaml template is
# skipped when nebariApp.enabled=true (see the template guard).
#
# httpRoute.hostname is still required here — the NebariApp template uses it
# for spec.hostname. 'make install' overrides it via --set with the live
# nip.io address derived from the Gateway's MetalLB IP.
nebariApp:
  enabled: true

# ---------------------------------------------------------------------------
# Frontend + oauth2-proxy sidecar
# ---------------------------------------------------------------------------
frontend:
  image:
    # Image loaded into minikube by 'make image-build'
    repository: nebari-landing/nebari-landing
    tag: dev
    pullPolicy: Never

  keycloak:
    # Browser-visible Keycloak URL — overridden by 'make install' via --set
    # with the live nip.io hostname (http://keycloak.<gateway-ip>.nip.io/auth).
    # Placeholder only; ensure 'make install' has run before using the app.
    url: "http://keycloak.local/auth"
    realm: "nebari"
    clientId: "nebari-landingpage"

  oauth2Proxy:
    # Keycloak realm discovery endpoint — cluster-internal for the pod
    oidcIssuerUrl: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local/auth/realms/nebari"
    clientId: "nebari-landingpage"
    # Secret created by 'make frontend-client', keys: client-secret, cookie-secret
    existingSecret: "nebari-landing-oauth2-proxy"
    extraArgs:
      # Skip TLS verification — self-signed certs in minikube
      - --insecure-oidc-skip-issuer-verification=true
      - --insecure-oidc-allow-unverified-email=true
      # Cookie settings — no HTTPS in local dev
      - --cookie-secure=false
      - --cookie-samesite=lax
      - --cookie-name=_nebari_session
      # groups is added via a Keycloak client mapper, not a scope
      - --scope=openid profile email
      # UX
      - --skip-provider-button=true
      - --silence-ping-logging=true
      # Public routes — skip auth so unauthenticated users can access /public
      - --skip-auth-route=^/public
      # Static assets must bypass auth so the browser can load JS/CSS chunks
      # for public routes without being redirected to Keycloak login.
      - --skip-auth-route=^/assets/
      - --skip-auth-route=^/favicon
      - --skip-auth-route=^/config\.json$
      # Vite dev-server internal paths (dev-watch mode only).
      # In production nginx serves pre-built bundles from /assets/ — these
      # paths don't exist. In dev-watch Vite serves source files directly and
      # oauth2-proxy would intercept them, breaking HMR and initial page load.
      - --skip-auth-route=^/@vite/
      - --skip-auth-route=^/@react-refresh
      - --skip-auth-route=^/@fs/
      - --skip-auth-route=^/src/
      - --skip-auth-route=^/node_modules/

  # Traffic enters via Envoy Gateway (HTTPRoute); ClusterIP is sufficient.
  service:
    type: ClusterIP

# ---------------------------------------------------------------------------
# Redis subchart (bitnami/redis)
# Auth disabled for dev — no password needed
# Persistence disabled — data is ephemeral; cluster restarts wipe it (fine for dev)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  auth:
    enabled: false
  architecture: standalone
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ---------------------------------------------------------------------------
# Envoy Gateway HTTPRoute
# ---------------------------------------------------------------------------
# With nebariApp.enabled=true above, the chart's httproute.yaml template is
# NOT rendered (guard: httpRoute.enabled && !nebariApp.enabled).
# The operator creates the actual HTTPRoutes by reconciling the NebariApp CRs.
#
# httpRoute.hostname and httpRoute.tls are still read by the NebariApp
# template (spec.hostname / spec.routing.tls.enabled), so they must be set.
# 'make install' injects them via --set at deploy time.
httpRoute:
  enabled: false          # never enable — operator owns routing when nebariApp=true
  gatewayName: "envoy-gateway"
  gatewayNamespace: "envoy-gateway-system"
  hostname: "nebari.local" # overridden by 'make install' with live nip.io hostname
  tls: false
