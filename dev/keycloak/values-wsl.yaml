# WSL overlay for Keycloak Helm values.
#
# Applied on top of values.yaml when running `make wsl-setup` (or any target
# that calls keycloak-install-wsl):
#
#   helm upgrade --install keycloak ... \
#     --values dev/keycloak/values.yaml \
#     --values dev/keycloak/values-wsl.yaml
#
# Problem: in WSL2, minikube's docker bridge (192.168.49.x) is reachable
# inside the WSL VM but NOT from the Windows host browser. MetalLB L2 mode
# therefore cannot expose services to the host.
#
# Solution: All services are exposed via NodePort + kubectl port-forward
# (see `make port-forward`). This file reconfigures Keycloak so that:
#
#   - Browser-visible URLs (auth flow, admin console) use localhost:<PORT>
#     (WSL2 automatically forwards localhost to the Windows host).
#   - Back-channel calls (JWKS, token endpoint) from pods inside the cluster
#     use the Keycloak cluster-internal DNS, enabled by KC_HOSTNAME_BACKCHANNEL_DYNAMIC.
#   - The Keycloak service is downgraded to NodePort (MetalLB not required).
#
# JWT issuer in tokens → http://localhost:8180/auth/realms/nebari
# OIDC back-channel (JWKS, token exchange from pods) → cluster-internal KC svc
extraEnv: |
  - name: KEYCLOAK_ADMIN
    value: admin
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-credentials
        key: admin-password
  - name: KC_DB
    value: postgres
  - name: KC_DB_URL_HOST
    value: postgresql.keycloak.svc.cluster.local
  - name: KC_DB_URL_DATABASE
    value: keycloak
  - name: KC_DB_USERNAME
    value: keycloak
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-postgresql-credentials
        key: password
  # Public URL the browser (Windows host) reaches via WSL2 localhost forwarding.
  # Auth redirects and the issuer claim in JWTs are based on this URL.
  - name: KC_HOSTNAME_URL
    value: http://localhost:8180/auth
  # Allow requests arriving at the cluster-internal service URL (for JWKS /
  # token endpoint back-channel calls from pods inside the cluster).
  - name: KC_HOSTNAME_STRICT
    value: "false"
  # Make back-channel endpoint URLs dynamic: when a pod hits Keycloak via the
  # cluster-internal DNS, the token_endpoint / jwks_uri in the discovery doc
  # reflects that hostname instead of localhost:8180. This lets oauth2-proxy
  # and the webapi complete back-channel requests without going through the
  # port-forward. (Keycloak 24 / Quarkus distribution only.)
  - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
    value: "true"
  # Explicitly disable HTTPS requirement — we run plain HTTP in local dev.
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"

# kubectl port-forward is a raw TCP tunnel — no HTTP proxy, no X-Forwarded-*
# headers are injected. The base values.yaml sets proxy.mode=xforwarded which
# causes Keycloak to try to reconstruct its base URL from absent headers and
# ends up computing a URL that doesn't match KC_HOSTNAME_URL. The result is
# that the admin console SPA hangs on load (the internal OIDC discovery call
# from the SPA never completes because Keycloak redirects to a wrong base URL).
# Setting mode=none makes Keycloak use KC_HOSTNAME_URL exclusively.
proxy:
  mode: none

service:
  # NodePort — no MetalLB LoadBalancer needed.
  # kubectl port-forward targets the svc directly (see `make port-forward`).
  type: NodePort
  httpPort: 80
  # Fixed NodePort so it is stable across restarts; matches PORT_KEYCLOAK_NODE in Makefile.
  httpNodePort: 30180
