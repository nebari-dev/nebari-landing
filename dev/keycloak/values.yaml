args:
  - start-dev
  - --cache=local

image:
  repository: quay.io/keycloak/keycloak
  tag: "24.0"
  pullPolicy: IfNotPresent

replicas: 1

extraEnv: |
  - name: KEYCLOAK_ADMIN
    value: admin
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-credentials
        key: admin-password
  - name: KC_DB
    value: postgres
  - name: KC_DB_URL_HOST
    value: postgresql.keycloak.svc.cluster.local
  - name: KC_DB_URL_DATABASE
    value: keycloak
  - name: KC_DB_USERNAME
    value: keycloak
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-postgresql-credentials
        key: password
  # Expose Keycloak at the MetalLB LoadBalancer IP (192.168.49.100:80).
  # This URL is reachable from both the host browser and from within the cluster
  # (via the node IP), so the JWT issuer matches everywhere — no port-forward needed.
  - name: KC_HOSTNAME
    value: localhost
  - name: KC_HTTP_RELATIVE_PATH
    value: /auth
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_DEBUG
    value: "true"

proxy:
  enabled: false

livenessProbe: |
  httpGet:
    path: /auth/health/live
    port: 8080
  initialDelaySeconds: 90
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe: |
  httpGet:
    path: /auth/health/ready
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

startupProbe: |
  httpGet:
    path: /auth/health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60

service:
  # MetalLB LoadBalancer — pinned to 192.168.49.100, exposed on port 80
  type: LoadBalancer
  httpPort: 80
  loadBalancerIP: "192.168.49.100"

ingress:
  enabled: false

postgresql:
  enabled: false

cache:
  stack: tcp

resources:
  requests:
    cpu: 500m
    memory: 1536Mi
  limits:
    cpu: 2000m
    memory: 3Gi
