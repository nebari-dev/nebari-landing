---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-webapi-client-setup
  namespace: keycloak
  labels:
    app.kubernetes.io/part-of: nebari-foundational
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: client-setup
          image: quay.io/keycloak/keycloak:24.0
          env:
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: admin-password
            - name: KEYCLOAK_URL
              value: http://keycloak-keycloakx-http.keycloak.svc.cluster.local/auth
          command:
            - /bin/bash
            - -c
            - |
              set -e
              KCADM="/opt/keycloak/bin/kcadm.sh"

              echo "Authenticating to Keycloak..."
              $KCADM config credentials \
                --server "$KEYCLOAK_URL" \
                --realm master \
                --user admin \
                --password "$KEYCLOAK_ADMIN_PASSWORD"

              REALM="nebari"

              # Helper: reliably resolve a client's internal UUID by clientId.
              # Always re-fetches after create/update so CLIENT_ID is never stale or empty.
              get_client_id() {
                $KCADM get clients -r "$REALM" --fields id,clientId \
                  | tr -d ' \n' \
                  | grep -o '"id":"[^"]*","clientId":"webapi"' \
                  | grep -o '"id":"[^"]*"' \
                  | cut -d'"' -f4
              }

              # Create webapi public client (password grant, no secret required)
              echo "Creating 'webapi' public client in realm '$REALM'..."
              EXISTING_ID=$(get_client_id)

              if [ -n "$EXISTING_ID" ]; then
                echo "Client 'webapi' already exists (id=$EXISTING_ID), updating..."
                $KCADM update clients/"$EXISTING_ID" -r "$REALM" \
                  -s enabled=true \
                  -s publicClient=true \
                  -s directAccessGrantsEnabled=true \
                  -s standardFlowEnabled=true \
                  -s 'redirectUris=["http://localhost:*","http://127.0.0.1:*"]' \
                  -s 'webOrigins=["*"]'
              else
                echo "Creating client 'webapi'..."
                $KCADM create clients -r "$REALM" \
                  -s clientId=webapi \
                  -s enabled=true \
                  -s publicClient=true \
                  -s directAccessGrantsEnabled=true \
                  -s standardFlowEnabled=true \
                  -s 'redirectUris=["http://localhost:*","http://127.0.0.1:*"]' \
                  -s 'webOrigins=["*"]'
              fi

              # Always re-fetch the internal UUID — never rely on the output of 'create'
              CLIENT_ID=$(get_client_id)
              if [ -z "$CLIENT_ID" ]; then
                echo "ERROR: could not resolve internal UUID for client 'webapi'" >&2
                exit 1
              fi
              echo "Client ID resolved: $CLIENT_ID"

              # Add groups protocol mapper so JWT includes 'groups' claim.
              # Check first to avoid a 409 on re-runs.
              echo "Adding groups claim mapper..."
              EXISTING_MAPPER=$($KCADM get clients/"$CLIENT_ID"/protocol-mappers/models \
                -r "$REALM" 2>/dev/null \
                | tr -d ' \n' \
                | grep -o '"name":"groups"' || true)
              if [ -n "$EXISTING_MAPPER" ]; then
                echo "Groups mapper already present, skipping."
              else
                $KCADM create clients/"$CLIENT_ID"/protocol-mappers/models -r "$REALM" \
                  -s name=groups \
                  -s protocol=openid-connect \
                  -s protocolMapper=oidc-group-membership-mapper \
                  -s 'config."full.path"=false' \
                  -s 'config."id.token.claim"=true' \
                  -s 'config."access.token.claim"=true' \
                  -s 'config."userinfo.token.claim"=true' \
                  -s 'config."claim.name"=groups'
                echo "Groups mapper added."
              fi

              echo "Keycloak webapi client setup complete!"
