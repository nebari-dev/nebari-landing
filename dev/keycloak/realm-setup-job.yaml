apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-setup
  namespace: keycloak
  labels:
    app.kubernetes.io/part-of: nebari-foundational
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: realm-setup
          image: quay.io/keycloak/keycloak:24.0
          env:
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: admin-password
            - name: REALM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nebari-realm-admin-credentials
                  key: password
            - name: KEYCLOAK_URL
              value: http://keycloak-keycloakx-http.keycloak.svc.cluster.local/auth
          command:
            - /bin/bash
            - -c
            - |
              set -e
              KCADM="/opt/keycloak/bin/kcadm.sh"

              echo "Waiting for Keycloak to be ready..."
              for i in $(seq 1 60); do
                if $KCADM config credentials --server "$KEYCLOAK_URL" --realm master --user admin --password "$KEYCLOAK_ADMIN_PASSWORD" 2>/dev/null; then
                  echo "Keycloak is ready"
                  break
                fi
                echo "Keycloak not ready, waiting... ($i/60)"
                sleep 5
              done

              echo "Creating nebari realm..."
              $KCADM create realms \
                -s realm=nebari \
                -s enabled=true \
                -s displayName="Nebari" \
                -s sslRequired=external \
                -s registrationAllowed=false \
                -s loginWithEmailAllowed=true \
                -s resetPasswordAllowed=true \
                -s bruteForceProtected=true || echo "Realm may already exist"

              echo "Creating realm roles..."
              $KCADM create roles -r nebari -s name=admin -s description="Administrator role" || true
              $KCADM create roles -r nebari -s name=user  -s description="Regular user role"  || true

              echo "Creating realm groups..."
              $KCADM create groups -r nebari -s name=admin || true
              $KCADM create groups -r nebari -s name=user  || true

              echo "Creating admin user in nebari realm..."
              $KCADM create users -r nebari \
                -s username=admin \
                -s enabled=true \
                -s emailVerified=true \
                -s firstName=Admin \
                -s lastName=User \
                -s email=admin@nebari.local || echo "User may already exist"

              echo "Setting admin user password..."
              $KCADM set-password -r nebari \
                --username admin \
                --new-password "$REALM_ADMIN_PASSWORD"

              echo "Assigning roles to admin user..."
              $KCADM add-roles -r nebari --uusername admin --rolename admin || true
              $KCADM add-roles -r nebari --uusername admin --rolename user  || true

              echo "Adding admin user to admin group..."
              ADMIN_USER_ID=$($KCADM get users -r nebari --query username=admin --fields id \
                | tr -d ' \n' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              ADMIN_GROUP_ID=$($KCADM get groups -r nebari --query search=admin --fields id,name \
                | tr -d ' \n' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "User ID: $ADMIN_USER_ID  Group ID: $ADMIN_GROUP_ID"
              # PUT with no body — Keycloak group membership endpoint
              $KCADM update "users/$ADMIN_USER_ID/groups/$ADMIN_GROUP_ID" -r nebari || true

              echo "Realm setup complete!"
