# ── Main nginx config (non-root safe) ────────────────────────────────────────
worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect all temp dirs to /tmp so nginx can run as non-root
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile        on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # Extract Bearer token injected by oauth2-proxy upstream header.
    # The SPA calls GET /auth-token to retrieve the token for webapi calls.
    map $http_authorization $bearer_token {
        ~^Bearer\s+(.+)$ $1;
        default "";
    }

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint (no logging)
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Token endpoint — oauth2-proxy injects Authorization: Bearer <token> upstream.
    # The SPA fetches this to obtain the access token for webapi calls.
    # Requires an authenticated session (oauth2-proxy blocks unauthenticated requests).
    location = /auth-token {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache" always;
        add_header Pragma "no-cache" always;
        return 200 '{"access_token":"$bearer_token"}';
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

} # end http
