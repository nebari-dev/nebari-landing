---
# Public service — visible to everyone, no auth required.
# Health status: healthy (probes webapi /api/v1/health — always returns 200)
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: docs
  namespace: nebari-system
spec:
  hostname: docs.nebari.local
  service:
    name: nebari-landing-webapi  # probe target: webapi /api/v1/health → 200 → healthy
    port: 8080
  landingPage:
    enabled: true
    displayName: "Documentation"
    description: "Nebari platform documentation and guides"
    icon: "https://fontawesome.com/icons/kubernetes?f=brands&s=solid"
    category: "Platform"
    priority: 10
    visibility: public
    healthCheck:
      enabled: true
      path: "/api/v1/health"  # webapi returns 200 {"status":"healthy"} → healthy
      intervalSeconds: 30
      timeoutSeconds: 5
---
# Health status: unhealthy (probes a non-existent service → DNS failure)
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: jupyterhub
  namespace: nebari-system
spec:
  hostname: jupyter.nebari.local
  service:
    name: jupyterhub  # doesn't exist in dev → DNS failure → unhealthy
    port: 8000
  landingPage:
    enabled: true
    displayName: "JupyterHub"
    description: "Interactive Python notebooks for data science"
    icon: "https://jupyter.org/assets/homepage/main-logo.svg"
    category: "Data Science"
    priority: 1
    visibility: private
    healthCheck:
      enabled: true
      path: "/hub/api/health"  # service unreachable → unhealthy
      intervalSeconds: 30
      timeoutSeconds: 5
---
# Private service — no health check configured.
# Health status: unknown (health checker skips services without a healthCheck)
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: grafana
  namespace: nebari-system
spec:
  hostname: grafana.nebari.local
  service:
    name: grafana
    port: 3000
  landingPage:
    enabled: true
    displayName: "Grafana"
    description: "Platform metrics and dashboards"
    icon: "https://upload.wikimedia.org/wikipedia/commons/a/a1/Grafana_logo.svg"
    category: "Monitoring"
    priority: 20
    visibility: private
    # No healthCheck block → status stays "unknown"
---
# Private service — requires JWT + admin group membership.
# Health status: healthy (probes webapi /ping → 200)
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: admin-panel
  namespace: nebari-system
spec:
  hostname: admin.nebari.local
  service:
    name: nebari-landing-webapi
    port: 8080
  landingPage:
    enabled: true
    displayName: "Admin Panel"
    description: "Cluster administration — restricted access"
    # https://github.com/keycloak/keycloak-misc/blob/main/logo/logo-icon.png
    category: "Platform"
    icon: "https://raw.githubusercontent.com/keycloak/keycloak-misc/main/logo/logo-icon.png"
    priority: 999
    visibility: private
    requiredGroups:
      - "admin"
    healthCheck:
      enabled: true
      path: "/api/v1/health"  # webapi returns 200 {"status":"healthy"} → healthy
      intervalSeconds: 30
      timeoutSeconds: 5
---
# Disabled app — should NOT appear in /api/v1/services
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: disabled-app
  namespace: nebari-system
spec:
  hostname: disabled.nebari.local
  service:
    name: nebari-landingpage
    port: 80
  landingPage:
    enabled: false
    displayName: "Disabled App"
    category: "Platform"
