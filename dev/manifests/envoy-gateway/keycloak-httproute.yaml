# HTTPRoute for Keycloak — applied by 'make keycloak-install' via envsubst.
# The ${KEYCLOAK_HOSTNAME} placeholder is substituted at runtime with the
# Envoy Gateway's nip.io hostname (e.g. keycloak.192-168-49-100.nip.io).
#
# Placed in the 'keycloak' namespace so it can reference the Keycloak
# Service directly without a ReferenceGrant (same-namespace backend).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: nebari-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "${KEYCLOAK_HOSTNAME}"
  rules:
    # Route all traffic on this hostname to Keycloak.
    # Keycloak itself is configured with KC_HTTP_RELATIVE_PATH=/auth so all
    # meaningful paths (/auth/realms/…, /auth/admin/…) already carry the prefix.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak-keycloakx-http
          port: 80
