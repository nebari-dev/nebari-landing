apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebari-landingpage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nebari-landingpage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nebari-landingpage
    spec:
      serviceAccountName: nebari-landingpage
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: nebari-landingpage
          image: nebari-landing:latest
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
