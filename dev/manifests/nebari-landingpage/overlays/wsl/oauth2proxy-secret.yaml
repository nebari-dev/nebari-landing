# Cookie encryption key for the oauth2-proxy session cookie.
# Identical to overlays/dev/oauth2proxy-secret.yaml — reproduced here so the
# WSL overlay is self-contained and does not depend on the dev overlay path.
#
# The OIDC client credentials (client-id, client-secret) are stored separately
# in the Secret 'nebari-landingpage-oidc-client', created by `make frontend-client-wsl`.
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
  namespace: nebari-system
  labels:
    app.kubernetes.io/part-of: nebari-foundational
type: Opaque
stringData:
  # Generate with: python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
  cookie-secret: "Dna8whLES7qDi5Uq3lGdplsXcL56wLr80ZVU7osda94="
