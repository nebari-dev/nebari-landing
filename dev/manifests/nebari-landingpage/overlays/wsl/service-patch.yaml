# NodePort service for the landing page in WSL mode.
# Traffic flow: kubectl port-forward localhost:8080 → pod:4180 (oauth2-proxy) → pod:8080 (nginx)
#
# Fixed NodePort 30080 matches the PORT_LANDING_NODE variable in the Makefile
# and allows alternative access via `minikube service nebari-landingpage -n nebari-system --url`.
apiVersion: v1
kind: Service
metadata:
  name: nebari-landingpage
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: proxy   # oauth2-proxy named port (4180)
      nodePort: 30080
