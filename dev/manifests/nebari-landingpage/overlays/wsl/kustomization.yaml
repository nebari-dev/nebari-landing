apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# WSL variant of the nebari-landingpage overlay.
# Differences from overlays/dev/:
#   - oauth2-proxy uses the cluster-internal Keycloak URL for OIDC discovery
#     (back-channel) and skips issuer-URL verification (which would fail
#     because the issuer in tokens is localhost:8180, unreachable from pods).
#   - Redirect URL points to localhost:8080 (WSL2 port-forward).
#   - Service is NodePort instead of MetalLB LoadBalancer.
#
# Apply with:  kubectl apply -k dev/manifests/nebari-landingpage/overlays/wsl

namespace: nebari-system

resources:
  - ../../base
  - oauth2proxy-secret.yaml

images:
  - name: nebari-landing
    newTag: dev

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: nebari-landingpage

  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: nebari-landingpage

  - path: service-patch.yaml
    target:
      kind: Service
      name: nebari-landingpage
