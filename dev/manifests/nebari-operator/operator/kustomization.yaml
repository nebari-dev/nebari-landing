apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nebari-operator-system

resources:
  - https://github.com/nebari-dev/nebari-operator.git/config/default

images:
  # The upstream config/default kustomization renames 'controller:latest' →
  # 'nebari-operator:latest'. We must match that final name and redirect
  # to the actual published image on quay.io.
  - name: nebari-operator
    newName: quay.io/nebari/nebari-operator
    newTag: latest

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: nebari-operator-controller-manager
