apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapi
  namespace: nebari-system
  labels:
    app.kubernetes.io/name: nebari-operator
    app.kubernetes.io/component: webapi
    app.kubernetes.io/part-of: nebari-foundational
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: webapi
      app.kubernetes.io/name: nebari-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/component: webapi
        app.kubernetes.io/name: nebari-operator
    spec:
      serviceAccountName: webapi
      containers:
        - name: api
          image: {{ .WebAPIImage }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # JWT validation
            - name: ENABLE_AUTH
              value: "true"
            - name: KEYCLOAK_URL
              value: "{{ .KeycloakAuthURL }}"
            - name: KEYCLOAK_ISSUER_URL
              value: "{{ .KeycloakIssuerURL }}"
            - name: KEYCLOAK_REALM
              value: "{{ .KeycloakRealm }}"
            # Keycloak admin credentials — read from the secret directly
            - name: KEYCLOAK_ADMIN_SECRET_NAME
              value: "{{ .KeycloakAdminSecretName }}"
            - name: KEYCLOAK_ADMIN_SECRET_NAMESPACE
              value: "{{ .KeycloakAdminSecretNamespace }}"
            # Admin access-control
            - name: ADMIN_GROUP
              value: admin
            # Redis
            - name: REDIS_ADDR
              value: "nebari-redis-master.nebari-system.svc.cluster.local:6379"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapi
  namespace: nebari-system
  labels:
    app.kubernetes.io/name: nebari-operator
    app.kubernetes.io/component: webapi
---
apiVersion: v1
kind: Service
metadata:
  name: webapi
  namespace: nebari-system
  labels:
    app.kubernetes.io/name: nebari-operator
    app.kubernetes.io/component: webapi
spec:
  selector:
    app.kubernetes.io/component: webapi
    app.kubernetes.io/name: nebari-operator
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
