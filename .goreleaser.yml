# GoReleaser configuration for the nebari-landing webapi binary.
#
# Builds the Go webapi (cmd/main.go) for Linux and macOS (amd64 + arm64).
# Triggered by the Release workflow; artifacts are attached to the GitHub release.
#
# Local snapshot test:
#   goreleaser release --snapshot --clean
version: 2

project_name: nebari-landing

before:
  hooks:
    - go mod tidy

builds:
  - id: webapi
    main: ./cmd/main.go
    binary: nebari-webapi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: webapi
    builds: [webapi]
    name_template: "nebari-webapi_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  # Update the existing GitHub release (created by the release event trigger)
  # instead of creating a new one.  draft / prerelease are inherited from the
  # existing release object so we don't set them here.
  github:
    owner: nebari-dev
    name: nebari-landing
