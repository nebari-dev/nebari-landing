name: Frontend Accessibility

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-accessibility.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-accessibility.yml"
  workflow_dispatch:

jobs:
  playwright-mock:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      VITE_BYPASS_AUTH: "true"
      MOCK_E2E_BASE_URL: "http://127.0.0.1:5173"
      PW_SCREENSHOTS: only-on-failure
      PW_OUTPUT_DIR: .playwright/artifacts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start frontend in bypass mode
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > /tmp/frontend-dev.log 2>&1 &
          echo $! > /tmp/frontend-dev.pid

      - name: Wait for frontend
        run: npx wait-on http://127.0.0.1:5173

      - name: Run Playwright accessibility/browser tests
        run: npx playwright test --project=mock-chromium

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mock-report
          path: |
            frontend/.playwright/report
            frontend/.playwright/artifacts
            /tmp/frontend-dev.log
