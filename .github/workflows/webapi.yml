# Nebari WebAPI — CI/CD
#
# Triggers:
#   - push / PR touching nebari-webapi/**
#   - manual dispatch (workflow_dispatch)
#
# Jobs:
#   test     — go vet + unit tests
#   build    — build binary to verify compilation
#   docker   — build & push image to quay.io (on push to main only)

name: nebari-webapi

on:
  push:
    branches: [main]
    paths:
      - nebari-webapi/**
      - .github/workflows/webapi.yml
  pull_request:
    paths:
      - nebari-webapi/**
      - .github/workflows/webapi.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: nebari-webapi

env:
  IMAGE: quay.io/nebari/nebari-webapi

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: nebari-webapi/go.mod
          cache-dependency-path: nebari-webapi/go.sum

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/... -count=1 -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: nebari-webapi/coverage.out

  # ── Build binary ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: nebari-webapi/go.mod
          cache-dependency-path: nebari-webapi/go.sum

      - name: Build binary (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/webapi ./cmd

      - name: Build binary (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/webapi-arm64 ./cmd

  # ── Container image ───────────────────────────────────────────────────────
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: build
    # Only push on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Derive image tag
        id: tag
        run: |
          SHA="${{ github.sha }}"
          echo "sha=${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: nebari-webapi
          file: nebari-webapi/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
