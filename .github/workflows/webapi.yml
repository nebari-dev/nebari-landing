# Nebari WebAPI — CI/CD
#
# Triggers:
#   - push / PR touching nebari-webapi/**
#   - manual dispatch (workflow_dispatch)
#
# Jobs:
#   test     — go vet + unit tests
#   build    — build binary to verify compilation
#   docker   — build & push image to quay.io (on push to main only)

name: nebari-webapi

on:
  push:
    branches: [main]
    paths:
      - nebari-webapi/**
      - .github/workflows/webapi.yml
  pull_request:
    paths:
      - nebari-webapi/**
      - .github/workflows/webapi.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: nebari-webapi

env:
  IMAGE: quay.io/nebari/nebari-webapi

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: nebari-webapi/go.mod
          cache-dependency-path: nebari-webapi/go.sum

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/... -count=1 -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: nebari-webapi/coverage.out

  # ── Build binary ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: nebari-webapi/go.mod
          cache-dependency-path: nebari-webapi/go.sum

      - name: Build binary (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/webapi ./cmd

      - name: Build binary (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o /tmp/webapi-arm64 ./cmd

  # ── Container image (native-runner matrix, one job per arch) ─────────────
  #
  # Each leg runs on a real machine of the target architecture — no QEMU
  # emulation. After both legs succeed a final job stitches them into a
  # multi-arch manifest and pushes the combined :latest / :<sha> tags.
  docker:
    name: Docker build & push (${{ matrix.arch }})
    needs: build
    # Only push on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest        # GitHub-hosted x86-64
          - arch: arm64
            runner: ubuntu-24.04-arm     # GitHub-hosted native arm64
    runs-on: ${{ matrix.runner }}
    outputs:
      # Each leg exposes its digest so the manifest job can reference them.
      digest-amd64: ${{ matrix.arch == 'amd64' && steps.push.outputs.digest || '' }}
      digest-arm64: ${{ matrix.arch == 'arm64' && steps.push.outputs.digest || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive short SHA
        id: tag
        run: |
          SHA="${{ github.sha }}"
          echo "sha=${SHA::7}" >> "$GITHUB_OUTPUT"

      # Build a single-arch image and push it under an arch-specific tag.
      # The manifest job will turn these into a combined multi-arch image.
      - name: Build and push arch image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: nebari-webapi
          file: nebari-webapi/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          # Push under a per-arch tag; overwritten on every run — that's fine
          # because the manifest job will create the real consumer-facing tags.
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  # ── Combine arch images into a multi-arch manifest ────────────────────────
  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Derive short SHA
        id: tag
        run: |
          SHA="${{ github.sha }}"
          echo "sha=${SHA::7}" >> "$GITHUB_OUTPUT"

      # docker manifest create stitches the two arch-specific images into a
      # single manifest list that clients resolve based on their platform.
      - name: Create and push manifest
        run: |
          SHA_TAG="${{ steps.tag.outputs.sha }}"
          AMD="${{ env.IMAGE }}:${SHA_TAG}-amd64"
          ARM="${{ env.IMAGE }}:${SHA_TAG}-arm64"

          docker manifest create "${{ env.IMAGE }}:${SHA_TAG}" "$AMD" "$ARM"
          docker manifest push "${{ env.IMAGE }}:${SHA_TAG}"

          docker manifest create "${{ env.IMAGE }}:latest" "$AMD" "$ARM"
          docker manifest push "${{ env.IMAGE }}:latest"
