# Frontend — CI
#
# Triggers:
#   - push / PR touching frontend/** or this workflow file
#   - manual dispatch
#
# Jobs:
#   lint   — ESLint
#   build  — tsc type-check + Vite production build

name: frontend

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + Vite build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
