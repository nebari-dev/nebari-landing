# ClusterRole: read NebariApp CRDs cluster-wide so the watcher can list/watch
# them across all namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nebari-landing.fullname" . }}-webapi-reader
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: webapi
rules:
  - apiGroups: ["reconcilers.nebari.dev"]
    resources: ["nebariapps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nebari-landing.fullname" . }}-webapi-reader
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: webapi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nebari-landing.fullname" . }}-webapi-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "nebari-landing.webapi.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role in the Keycloak namespace so the webapi ServiceAccount can read the
# admin Secret there directly — no ExternalSecret sync needed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nebari-landing.fullname" . }}-webapi-keycloak-reader
  namespace: {{ .Values.webapi.keycloak.adminSecretNamespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: webapi
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: [{{ .Values.webapi.keycloak.adminSecretName | quote }}]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nebari-landing.fullname" . }}-webapi-keycloak-reader
  namespace: {{ .Values.webapi.keycloak.adminSecretNamespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: webapi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nebari-landing.fullname" . }}-webapi-keycloak-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "nebari-landing.webapi.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
