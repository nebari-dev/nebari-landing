apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebari-landing.fullname" . }}-webapi
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: webapi
spec:
  type: {{ .Values.webapi.service.type }}
  ports:
    - name: http
      port: {{ .Values.webapi.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "nebari-landing.webapi.selectorLabels" . | nindent 4 }}
