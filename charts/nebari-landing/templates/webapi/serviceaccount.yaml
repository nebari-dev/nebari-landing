{{- if .Values.webapi.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nebari-landing.webapi.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: webapi
  {{- with .Values.webapi.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
