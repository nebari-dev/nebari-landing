{{- if and .Values.redis.enabled .Values.redis.auth.enabled .Values.redis.auth.existingSecret }}
{{- /*
Bootstrap the Redis password secret exactly once.

When redis.auth.existingSecret is set, Bitnami skips its own secret.yaml and
expects the secret to already exist. This hook creates it on first install and
is a no-op on upgrades — keeping the password stable across ArgoCD self-heal
syncs (which use `helm template` and cannot run Helm's lookup()).

DUAL-HOOK STRATEGY:
This template uses both Helm hooks (helm.sh/hook) and ArgoCD-native hooks
(argocd.argoproj.io/hook) to ensure the secret is created reliably in both contexts:
  - Direct `helm install`: Uses pre-install,pre-upgrade Helm hooks
  - ArgoCD deployment: Uses PreSync ArgoCD hooks (more reliable in ArgoCD environments)

The hook-delete-policy ensures failed hooks are cleaned up and retried:
  - Helm: before-hook-creation,hook-failed
  - ArgoCD: BeforeHookCreation (always cleans up on retry)
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nebari-landing.fullname" . }}-redis-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-init
  annotations:
    # Helm hook - runs when using `helm install` directly
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-failed
    # ArgoCD-native hook - runs in PreSync phase when deployed via ArgoCD
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nebari-landing.fullname" . }}-redis-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-init
  annotations:
    # Helm hook - runs when using `helm install` directly
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-failed
    # ArgoCD-native hook - runs in PreSync phase when deployed via ArgoCD
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nebari-landing.fullname" . }}-redis-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-init
  annotations:
    # Helm hook - runs when using `helm install` directly
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-failed
    # ArgoCD-native hook - runs in PreSync phase when deployed via ArgoCD
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nebari-landing.fullname" . }}-redis-init
subjects:
  - kind: ServiceAccount
    name: {{ include "nebari-landing.fullname" . }}-redis-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nebari-landing.fullname" . }}-redis-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-init
  annotations:
    # Helm hook - runs when using `helm install` directly
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-failed
    # ArgoCD-native hook - runs in PreSync phase when deployed via ArgoCD
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "nebari-landing.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis-init
    spec:
      serviceAccountName: {{ include "nebari-landing.fullname" . }}-redis-init
      restartPolicy: OnFailure
      containers:
        - name: redis-secret-init
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -ec
            - |
              SECRET_NAME="{{ printf "%s-redis" .Release.Name }}"
              NAMESPACE="{{ .Release.Namespace }}"

              if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" > /dev/null 2>&1; then
                echo "Secret $SECRET_NAME already exists — skipping creation."
              else
                echo "Secret $SECRET_NAME not found — generating a new Redis password."
                PASSWORD=$(< /dev/urandom tr -dc 'A-Za-z0-9' | head -c 22)
                kubectl create secret generic "$SECRET_NAME" \
                  --from-literal=redis-password="$PASSWORD" \
                  -n "$NAMESPACE"
                echo "Secret $SECRET_NAME created."
              fi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
{{- end }}
