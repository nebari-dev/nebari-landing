{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nebari-landing.fullname" . }}-frontend-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  # Served by nginx at /config.json. The frontend fetches this file at startup
  # so that Keycloak connection settings can be changed without rebuilding the image.
  config.json: |
    {
      "keycloak": {
        "url":      {{ .Values.frontend.keycloak.url      | quote }},
        "realm":    {{ .Values.frontend.keycloak.realm     | quote }},
        "clientId": {{ default (printf "%s-%s-spa" .Release.Namespace (include "nebari-landing.fullname" .)) .Values.frontend.keycloak.clientId | quote }}
      },
      "title":      {{ .Values.frontend.branding.title      | quote }},
      "logoUrl":   {{ .Values.frontend.branding.logoUrl   | quote }},
      "faviconUrl": {{ .Values.frontend.branding.faviconUrl | quote }},
      "theme":      {{ .Values.frontend.branding.theme | toJson }}
    }

  # nginx configuration for the frontend pod.
  #
  # Traffic flow (production):
  #   Browser → Gateway → frontend Service (oauth2-proxy:4180)
  #     → oauth2-proxy validates session cookie, injects Authorization: Bearer <token>
  #       → nginx (127.0.0.1:{{ .Values.frontend.port }})
  #         ├─ /api/*  → proxy_pass to webapi ClusterIP (cluster DNS, never public)
  #         └─ /*      → serve SPA index.html
  #
  # The webapi is never exposed through the Gateway.
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        client_body_temp_path /tmp/client_temp;
        proxy_temp_path       /tmp/proxy_temp_path;
        fastcgi_temp_path     /tmp/fastcgi_temp;
        uwsgi_temp_path       /tmp/uwsgi_temp;
        scgi_temp_path        /tmp/scgi_temp;

        sendfile        on;
        keepalive_timeout 65;

        access_log /dev/stdout;
        error_log  /dev/stderr warn;

        # WebSocket upgrade map (required for /api/v1/ws)
        map $http_upgrade $connection_upgrade {
            default   upgrade;
            ''        close;
        }

        server {
            listen {{ .Values.frontend.port }};
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            gzip on;
            gzip_types text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript
                       image/svg+xml;
            gzip_min_length 1024;

            # Proxy /api/* to the webapi ClusterIP — never exposed publicly.
            location /api/ {
                proxy_pass         http://{{ include "nebari-landing.fullname" . }}-webapi.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.webapi.service.port }}/api/;
                proxy_set_header   Authorization      $http_authorization;
                proxy_set_header   X-Real-IP          $remote_addr;
                proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
                proxy_set_header   Host               $host;
                proxy_http_version 1.1;
                proxy_set_header   Upgrade            $http_upgrade;
                proxy_set_header   Connection         $connection_upgrade;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
            }

            # Cache static assets aggressively (Vite outputs content-hashed filenames)
            location ~* \.(js|css|png|svg|ico|woff2?|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                try_files $uri =404;
            }

            # Health check
            location /healthz {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }

            # SPA fallback
            location / {
                try_files $uri $uri/ /index.html;
            }
        }
    }
{{- end }}
