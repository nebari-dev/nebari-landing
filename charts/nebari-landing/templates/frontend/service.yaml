apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebari-landing.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-landing.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: proxy
      port: {{ .Values.frontend.service.port }}
      targetPort: proxy
      protocol: TCP
  selector:
    {{- include "nebari-landing.frontend.selectorLabels" . | nindent 4 }}
